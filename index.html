<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium and responsive Expense & Budget Visualizer dashboard with real-time statistics, category charts, and persistent local storage.">
    <title>Sleek Expense & Budget Visualizer</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <!-- Application Logic -->
    <script src="js/app.js" defer></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="glass-panel">
            <div class="logo-container">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>FinInsight</h1>
                    <p>Premium Expense & Budget Visualizer</p>
                </div>
            </div>
            
            <!-- Edit Budget Settings -->
            <div class="budget-setup-header">
                <span style="font-weight: 500; font-size: 0.9rem; color: var(--text-secondary);">Monthly Budget:</span>
                <div class="budget-input-wrapper">
                    <span class="budget-currency-symbol">$</span>
                    <input type="number" id="budget-input" class="budget-edit-input" placeholder="1000" min="0" step="50" title="Set your total budget limit">
                </div>
            </div>
        </header>

        <!-- KPI Cards Grid -->
        <div class="kpi-grid">
            <!-- Total Budget Card -->
            <div class="glass-panel kpi-card kpi-budget">
                <div class="kpi-info">
                    <h3>Total Budget</h3>
                    <div id="total-budget" class="kpi-value">$0.00</div>
                </div>
                <div class="kpi-icon-container">
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M12 16v1M10 6h4a2 2 0 110 4h-4V6z"/>
                    </svg>
                </div>
            </div>

            <!-- Total Expenses Card -->
            <div class="glass-panel kpi-card kpi-expenses">
                <div class="kpi-info">
                    <h3>Total Expenses</h3>
                    <div id="total-expenses" class="kpi-value">$0.00</div>
                </div>
                <div class="kpi-icon-container">
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                </div>
            </div>

            <!-- Remaining Balance Card -->
            <div class="glass-panel kpi-card" id="kpi-balance-card">
                <div class="kpi-info">
                    <h3>Remaining Balance</h3>
                    <div id="remaining-balance" class="kpi-value">$0.00</div>
                </div>
                <div class="kpi-icon-container">
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Budget Usage Progress Panel -->
        <div class="glass-panel budget-progress-panel">
            <div class="progress-header">
                <span class="progress-label">Budget Consumption Status: <span id="progress-label" style="font-weight: 700;">Healthy</span></span>
                <span id="progress-percent" class="progress-percent">0%</span>
            </div>
            <div class="progress-track" title="Budget spent percentage tracker">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <!-- Dashboard Grid Layout -->
        <main class="dashboard-grid">
            
            <!-- Section 1: Add Transaction -->
            <section class="glass-panel form-panel">
                <h2 class="panel-title">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color: var(--primary);">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                    </svg>
                    Add Transaction
                </h2>
                
                <form id="transaction-form" novalidate>
                    <!-- Item Name -->
                    <div class="form-group">
                        <label for="item-name" class="form-label">Item / Description</label>
                        <input type="text" id="item-name" class="form-input" placeholder="e.g., Grocery Shopping" required>
                    </div>

                    <!-- Amount -->
                    <div class="form-group">
                        <label for="item-amount" class="form-label">Amount (USD)</label>
                        <input type="number" id="item-amount" class="form-input" placeholder="0.00" min="0.01" step="0.01" required>
                    </div>

                    <!-- Transaction Date -->
                    <div class="form-group">
                        <label for="item-date" class="form-label">Date</label>
                        <input type="date" id="item-date" class="form-input" required>
                    </div>

                    <!-- Category visual pills selection -->
                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <div id="category-pills-container">
                            <div class="category-pills">
                                <!-- Food -->
                                <label class="category-pill cat-food" title="Food and drinks">
                                    <input type="radio" name="category-pill" value="food">
                                    <div class="category-pill-box">
                                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                                        <span>Food</span>
                                    </div>
                                </label>
                                <!-- Rent -->
                                <label class="category-pill cat-rent" title="Rent and housing">
                                    <input type="radio" name="category-pill" value="rent">
                                    <div class="category-pill-box">
                                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                                        <span>Rent</span>
                                    </div>
                                </label>
                                <!-- Leisure -->
                                <label class="category-pill cat-leisure" title="Movies, hobbies, shopping">
                                    <input type="radio" name="category-pill" value="leisure">
                                    <div class="category-pill-box">
                                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                        <span>Leisure</span>
                                    </div>
                                </label>
                                <!-- Transport -->
                                <label class="category-pill cat-transport" title="Gas, transit, commute">
                                    <input type="radio" name="category-pill" value="transport">
                                    <div class="category-pill-box">
                                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                                        <span>Commute</span>
                                    </div>
                                </label>
                                <!-- Utilities -->
                                <label class="category-pill cat-utilities" title="Power, water, gas, internet">
                                    <input type="radio" name="category-pill" value="utilities">
                                    <div class="category-pill-box">
                                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                        <span>Utilities</span>
                                    </div>
                                </label>
                                <!-- Other -->
                                <label class="category-pill cat-other" title="Miscellaneous expenses">
                                    <input type="radio" name="category-pill" value="other">
                                    <div class="category-pill-box">
                                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                                        <span>Other</span>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">
                        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                        </svg>
                        Add Transaction
                    </button>
                </form>
            </section>

            <!-- Section 2: Transaction History -->
            <section class="glass-panel history-panel">
                <h2 class="panel-title">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color: var(--warning);">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    Recent Transactions
                </h2>

                <!-- Filters -->
                <div class="history-filters">
                    <div class="search-wrapper">
                        <input type="text" id="search-input" class="search-input" placeholder="Search transactions...">
                        <svg class="search-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <select id="category-filter" class="filter-select" title="Filter by category">
                        <option value="all">All Categories</option>
                        <option value="food">Food</option>
                        <option value="rent">Rent</option>
                        <option value="leisure">Leisure</option>
                        <option value="transport">Transport</option>
                        <option value="utilities">Utilities</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <!-- Transaction Scrollable List -->
                <div id="transaction-list" class="transaction-list-container">
                    <!-- Dynamic Rows Loaded Here -->
                </div>
            </section>

            <!-- Section 3: Analytics & Quick Stats -->
            <section class="glass-panel visual-panel">
                <h2 class="panel-title">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color: var(--cat-leisure);">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"/>
                    </svg>
                    Category Breakdown
                </h2>

                <!-- Chart.js Container -->
                <div class="chart-container">
                    <canvas id="expense-doughnut-chart"></canvas>
                </div>

                <!-- Quick Stats -->
                <div class="quick-stats-container">
                    <div class="quick-stat-row">
                        <span class="quick-stat-label">Top Category:</span>
                        <span id="top-category" class="quick-stat-val">—</span>
                    </div>
                    <div class="quick-stat-row">
                        <span class="quick-stat-label">Total Spent:</span>
                        <span id="top-category-value" class="quick-stat-val">—</span>
                    </div>
                    <div class="quick-stat-row">
                        <span class="quick-stat-label">Highest Expense:</span>
                        <span id="max-expense-item" class="quick-stat-val">—</span>
                    </div>
                    <div class="quick-stat-row">
                        <span class="quick-stat-label">Total Items:</span>
                        <span id="total-count" class="quick-stat-val">—</span>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
